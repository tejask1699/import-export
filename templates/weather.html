{% extends "layout.html" %}
{% block content %}

<h2 style="margin-bottom:20px;">🌤️ Weather Dashboard</h2>

<!-- SEARCH + WEATHER -->
<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">

  <!-- WEATHER CHECK -->
  <div class="card">
    <h3>Weather Check</h3>

    <form id="weatherForm" style="display:flex; gap:10px; margin-bottom:15px;">
      <input id="cityInput" placeholder="Enter city..." required>
      <button class="btn">Check</button>
    </form>

    <div id="weatherContent">
      <div class="loading">Enter city to check weather</div>
    </div>
  </div>

  <!-- SHIPPING STATUS -->
  <div class="card">
    <h3>Shipping Recommendation</h3>

    <div id="shippingContent">
      <div class="loading">Weather analysis will appear here</div>
    </div>
  </div>

</div>

<!-- FORECAST -->
<div class="card">
  <h3>5-Day Forecast</h3>

  <div id="forecastContent">
    <div class="loading">Forecast data will appear here</div>
  </div>
</div>

<style>
input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

/* WEATHER DISPLAY */
.weather-box {
  text-align: center;
  padding: 15px;
}

.weather-temp {
  font-size: 32px;
  font-weight: 600;
}

.weather-condition {
  color: #666;
  margin-bottom: 10px;
}

.weather-details {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.weather-details div {
  background: #f8fafc;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
}

/* STATUS */
.status {
  padding: 15px;
  border-radius: 8px;
  text-align: center;
}

.status.proceed { background:#d4edda; color:#155724; }
.status.caution { background:#fff3cd; color:#856404; }
.status.delay { background:#f8d7da; color:#721c24; }
.status.cancel { background:#f5c6cb; color:#721c24; }

/* FORECAST */
.forecast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
  gap: 10px;
}

.forecast-item {
  background: #f8fafc;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

.loading {
  text-align:center;
  color:#666;
}

.error {
  background:#f8d7da;
  padding:10px;
  border-radius:6px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const weatherForm = document.getElementById('weatherForm');
  const cityInput = document.getElementById('cityInput');
  const weatherContent = document.getElementById('weatherContent');
  const shippingContent = document.getElementById('shippingContent');
  const forecastContent = document.getElementById('forecastContent');

  // AUTO LOCATION
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      getWeatherByCoordinates(pos.coords.latitude, pos.coords.longitude);
    });
  }

  weatherForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const city = cityInput.value.trim();
    if (city) await getWeatherByCity(city);
  });

  async function getWeatherByCity(city) {
    try {
      showLoading();
      const res = await fetch(`/api/weather/${city}`);
      const data = await res.json();

      if (data.success) {
        displayWeather(data.weather, data.shipping);
        await getForecast(city);
      } else {
        showError(data.error);
      }
    } catch {
      showError('Failed to fetch weather');
    }
  }

  async function getWeatherByCoordinates(lat, lon) {
    try {
      showLoading();
      const res = await fetch(`/api/weather/coordinates?lat=${lat}&lon=${lon}`);
      const data = await res.json();

      if (data.success) {
        displayWeather(data.weather, data.shipping);
      }
    } catch {}
  }

  async function getForecast(city) {
    try {
      const res = await fetch(`/api/forecast/${city}`);
      const data = await res.json();

      if (data.success) displayForecast(data.forecast);
    } catch {}
  }

  function displayWeather(weather, shipping) {
    const icon = getWeatherIcon(weather.weather[0].main);

    weatherContent.innerHTML = `
      <div class="weather-box">
        <div style="font-size:40px">${icon}</div>
        <div class="weather-temp">${Math.round(weather.main.temp)}°C</div>
        <div class="weather-condition">${weather.weather[0].description}</div>

        <div class="weather-details">
          <div>Wind: ${weather.wind.speed}</div>
          <div>Humidity: ${weather.main.humidity}%</div>
          <div>Visibility: ${(weather.visibility/1000).toFixed(1)}km</div>
        </div>
      </div>
    `;

    displayShipping(shipping);
  }

  function displayShipping(s) {
    const cls = s.action.toLowerCase();
    const icon = getStatusIcon(s.action);

    shippingContent.innerHTML = `
      <div class="status ${cls}">
        <div style="font-size:30px">${icon}</div>
        <h4>${s.recommendation}</h4>
        <p>${s.reason}</p>
        <small>Risk: ${s.risk}</small>
      </div>
    `;
  }

  function displayForecast(forecast) {
    forecastContent.innerHTML = `
      <div class="forecast-grid">
        ${forecast.map(f=>`
          <div class="forecast-item">
            <div>${formatDateTime(f.datetime)}</div>
            <div><strong>${Math.round(f.temp)}°C</strong></div>
            <div>${f.weather}</div>
            <div class="status ${f.shipping.action.toLowerCase()}">
              ${f.shipping.action}
            </div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function getWeatherIcon(c){
    return {
      Clear:"☀️", Clouds:"☁️", Rain:"🌧️",
      Drizzle:"🌦️", Thunderstorm:"⛈️",
      Snow:"❄️", Mist:"🌫️"
    }[c] || "🌤️";
  }

  function getStatusIcon(a){
    return {
      PROCEED:"✅", CAUTION:"⚠️",
      DELAY:"⏳", CANCEL:"🚫"
    }[a] || "❓";
  }

  function formatDateTime(d){
    return new Date(d).toLocaleString();
  }

  function showLoading(){
    weatherContent.innerHTML = `<div class="loading">Loading...</div>`;
    shippingContent.innerHTML = `<div class="loading">Analyzing...</div>`;
  }

  function showError(msg){
    weatherContent.innerHTML = `<div class="error">${msg}</div>`;
  }

});
</script>

{% endblock %}
