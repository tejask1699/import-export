{% extends "layout.html" %} {% block content %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Tracking - AI Shipping System</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f4c75, #3282b8);
        min-height: 100vh;
        color: #333;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        background: rgba(255, 255, 255, 0.95);
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .header h1 {
        color: #0f4c75;
        margin: 0 0 10px 0;
        font-size: 2.5rem;
      }

      .header p {
        color: #666;
        margin: 0;
        font-size: 1.1rem;
      }

      .tracking-container {
        display: grid;
        grid-template-columns: 1fr 350px;
        gap: 20px;
        margin-bottom: 20px;
      }

      .map-section {
        background: rgba(255, 255, 255, 0.95);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .map-section h3 {
        color: #0f4c75;
        margin-top: 0;
        margin-bottom: 15px;
      }

      #map {
        height: 500px;
        width: 100%;
        border-radius: 8px;
        border: 2px solid #ddd;
      }

      .tracking-info {
        background: rgba(255, 255, 255, 0.95);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .tracking-info h3 {
        color: #0f4c75;
        margin-top: 0;
        margin-bottom: 15px;
      }

      .shipment-card {
        background: rgba(15, 76, 117, 0.1);
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        border-left: 4px solid #3282b8;
      }

      .shipment-card.active {
        border-left-color: #28a745;
        background: rgba(40, 167, 69, 0.1);
      }

      .shipment-card h4 {
        color: #0f4c75;
        margin: 0 0 10px 0;
      }

      .shipment-details {
        font-size: 14px;
        color: #666;
      }

      .shipment-details strong {
        color: #0f4c75;
        display: block;
        margin-bottom: 5px;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        margin-top: 10px;
      }

      .status-badge.in-transit {
        background: #ffc107;
        color: #856404;
      }

      .status-badge.delivered {
        background: #28a745;
        color: #fff;
      }

      .status-badge.pending {
        background: #6c757d;
        color: #fff;
      }

      .status-badge.delayed {
        background: #dc3545;
        color: #fff;
      }

      .tracking-controls {
        background: rgba(255, 255, 255, 0.95);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
      }

      .tracking-controls h3 {
        color: #0f4c75;
        margin-top: 0;
        margin-bottom: 15px;
      }

      .control-form {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 15px;
        align-items: end;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        font-weight: bold;
        color: #0f4c75;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .form-group input,
      .form-group select {
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.3s ease;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #3282b8;
      }

      .btn-primary {
        background: linear-gradient(135deg, #0f4c75, #3282b8);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #3282b8, #0f4c75);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .live-indicator {
        display: inline-flex;
        align-items: center;
        background: #dc3545;
        color: white;
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        margin-left: 10px;
      }

      .live-dot {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        margin-right: 5px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }

        50% {
          opacity: 0.3;
        }

        100% {
          opacity: 1;
        }
      }

      .weather-alert {
        background: #fff3cd;
        border: 1px solid #ffeaa7;
        color: #856404;
        padding: 10px;
        border-radius: 5px;
        margin-top: 10px;
        font-size: 13px;
      }

      .back-link {
        display: inline-block;
        margin-top: 20px;
        color: #0f4c75;
        text-decoration: none;
        font-weight: bold;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 5px;
        transition: background 0.3s ease;
      }

      .back-link:hover {
        background: rgba(255, 255, 255, 1);
      }

      @media (max-width: 768px) {
        .tracking-container {
          grid-template-columns: 1fr;
        }

        .control-form {
          grid-template-columns: 1fr;
        }

        #map {
          height: 400px;
        }
      }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>🗺️ Live Shipment Tracking</h1>
        <p>Real-time GPS tracking with weather monitoring</p>
      </div>

      <div class="tracking-controls">
        <h3>📍 Track Shipment</h3>
        <form class="control-form" id="trackingForm">
          <div class="form-group">
            <label for="trackingNumber">Tracking Number</label>
            <input
              type="text"
              id="trackingNumber"
              placeholder="Enter tracking number..."
              required
            />
          </div>
          <div class="form-group">
            <label for="shipmentStatus">Filter by Status</label>
            <select id="shipmentStatus">
              <option value="">All Shipments</option>
              <option value="pending">Pending</option>
              <option value="in-transit">In Transit</option>
              <option value="delivered">Delivered</option>
              <option value="delayed">Delayed</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">🔍 Track</button>
        </form>
      </div>

      <div class="tracking-container">
        <div class="map-section">
          <h3>
            Live Map View
            <span class="live-indicator"
              ><span class="live-dot"></span>LIVE</span
            >
          </h3>
          <div id="map"></div>
        </div>

        <div class="tracking-info">
          <h3>📦 Active Shipments</h3>
          <div id="shipmentsList"></div>
        </div>
      </div>

      <!-- <a href="javascript:history.back()" class="back-link">← Back</a> -->
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
      let map;
      let markers = [];
      let routeLine;

      // ✅ Initialize Google Map
      function initMap() {
        map = L.map("map").setView([20.5937, 78.9629], 5);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap contributors",
        }).addTo(map);
      }

      // ✅ Handle form submit (MAIN LOGIC)
      document
        .getElementById("trackingForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const trackingNumber =
            document.getElementById("trackingNumber").value;

          try {
            const res = await fetch(`/api/tracking/${trackingNumber}`);
            const data = await res.json();

            if (!data.success) {
              alert(data.error || "Tracking failed");
              return;
            }
            // ✅ Update UI + Map
            updateShipmentInfo(data);
            updateMap(data);
          } catch (err) {
            console.error(err);
            alert("Server error");
          }
        });

      // ✅ Update Shipment Card UI
      function updateShipmentInfo(data) {
        const container = document.getElementById("shipmentsList");

        container.innerHTML = `
            <div class="shipment-card active">
                <h4>${data.tracking_number}</h4>
                <div class="shipment-details">
                    <strong>${data.origin} → ${data.destination}</strong>
                    <div>Priority: ${data.priority}</div>
                    <div>ETA: ${data.eta}</div>
                    <div>Progress: ${data.progress}%</div>
                    <div class="status-badge ${data.status}">
                        ${data.status}
                    </div>
                </div>
                ${
                  data.weather_alerts?.length
                    ? `<div class="weather-alert">⚠️ ${data.weather_alerts.join(", ")}</div>`
                    : ""
                }
            </div>
        `;
      }
    </script>
    <script>
      async function updateMap(data) {
        const origin = data.origin_coords;
        const destination = data.destination_coords;
        const current = data.current_coords;

        // Clear old
        markers.forEach((m) => map.removeLayer(m));
        markers = [];

        if (routeLine) map.removeLayer(routeLine);

        // Markers
        const originMarker = L.marker([origin.lat, origin.lng]).addTo(map);
        const destMarker = L.marker([destination.lat, destination.lng]).addTo(
          map,
        );
        const currentMarker = L.marker([current.lat, current.lng]).addTo(map);

        markers.push(originMarker, destMarker, currentMarker);

        try {
          // ✅ OSRM API (road route)
          const res = await fetch(
            `https://router.project-osrm.org/route/v1/driving/` +
              `${origin.lng},${origin.lat};${destination.lng},${destination.lat}` +
              `?overview=full&geometries=geojson`,
          );

          const routeData = await res.json();

          const coords = routeData.routes[0].geometry.coordinates;

          // Convert [lng, lat] → [lat, lng]
          const latLngs = coords.map((c) => [c[1], c[0]]);

          // Draw REAL road route
          routeLine = L.polyline(latLngs, {
            color: "#3282b8",
            weight: 5,
          }).addTo(map);

          map.fitBounds(routeLine.getBounds(), { padding: [20, 20] });
        } catch (err) {
          console.error("Routing failed", err);

          // fallback to straight line
          routeLine = L.polyline([
            [origin.lat, origin.lng],
            [destination.lat, destination.lng],
          ]).addTo(map);
        }
      }
    </script>
    <script>
      function goTrack(id) {
        window.location.href = `/tracking?tracking=${id}`;
      }
      function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      async function autoLoadTracking() {
        const trackingNumber = getQueryParam("tracking");

        if (!trackingNumber) return;

        // Fill input
        document.getElementById("trackingNumber").value = trackingNumber;

        try {
          const res = await fetch(`/api/tracking/${trackingNumber}`);
          const data = await res.json();

          if (!data.success) {
            console.warn("Auto tracking failed");
            return;
          }

          updateShipmentInfo(data);
          updateMap(data);
        } catch (err) {
          console.error("Auto tracking error", err);
        }
      }
      async function loadShipments() {
        try {
          const res = await fetch("/api/user-reports?limit=10");
          const data = await res.json();

          if (!data.success) return;

          const container = document.getElementById("shipmentsList");

          if (!data.data.length) {
            container.innerHTML = `<p>No shipments found</p>`;
            return;
          }

          container.innerHTML = data.data
            .map(
              (s) => `
            <div class="shipment-card ${s.status === "in-transit" ? "active" : ""}">
                <h4>${s.tracking_number}</h4>

                <div class="shipment-details">
                    <strong>${s.origin} → ${s.destination}</strong>

                    <div>Priority: ${s.priority || "-"}</div>
                    <div>Created: ${s.created_at ? new Date(s.created_at).toLocaleString() : "-"}</div>

                    <div class="status-badge ${s.status}">
                        ${s.status}
                    </div>
                </div>

                <!-- ✅ Track Button -->
                <button onclick="goTrack('${s.tracking_number}')"
                        style="margin-top:10px;">
                    Track
                </button>
            </div>
        `,
            )
            .join("");
        } catch (err) {
          console.error("Failed to load shipments", err);
        }
      }

      // Load on page start
      document.addEventListener("DOMContentLoaded", function () {
        initMap();
        loadShipments();
        autoLoadTracking(); // 🔥 KEY LINE
      });
    </script>
  </body>
</html>

{% endblock %}
