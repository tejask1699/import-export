{% extends "layout.html" %} {% block content %}

<h2 style="margin-bottom: 25px; font-size: 22px; font-weight: 600">
  🚢 Admin Dashboard
</h2>

<!-- CARDS -->
<div
  style="
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 25px;
    margin-bottom: 30px;
  "
>
  <div class="card" style="padding: 20px;">
    <h4>Total Shipments</h4>
    <p id="totalShipments">0</p>
  </div>

  <div class="card" style="padding: 20px;">
    <h4>In Transit</h4>
    <p id="inTransit">0</p>
  </div>

  <div class="card" style="padding: 20px;">
    <h4>Urgent Shipments</h4>
    <p id="urgent">0</p>
  </div>
</div>

<!-- TABLE -->
<div class="card" style="padding: 20px;">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Origin</th>
        <th>Destination</th>
        <th>Status</th>
        <th>Tracking</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="shipmentTable"></tbody>
  </table>
</div>

<script>
  fetch("/api/shipments")
    .then((res) => res.json())
    .then((res) => {
      const shipments = res.data;
      const table = document.getElementById("shipmentTable");

      let total = shipments.length;
      let inTransit = 0;
      let urgent = 0;

      shipments.forEach((s) => {
        if (s.status === "in-transit") inTransit++;
        if (s.priority === "Urgent") urgent++;

        table.innerHTML += `
        <tr>
          <td>${s.id}</td>
          <td>${s.origin}</td>
          <td>${s.destination}</td>
          <td>${s.status}</td>
          <td>${s.tracking_number}</td>
          <td>
            <button class="btn" onclick="goToTracking('${s.tracking_number}')">
              Track
            </button>
          </td>
        </tr>
      `;
      });

      document.getElementById("totalShipments").innerText = total;
      document.getElementById("inTransit").innerText = inTransit;
      document.getElementById("urgent").innerText = urgent;
    });

  function goToTracking(trackingNumber) {
    window.location.href = `/tracking?tracking=${trackingNumber}`;
  }
</script>

{% endblock %}
