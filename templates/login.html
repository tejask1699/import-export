<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shipping System - Login</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f4c75, #3282b8);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .card {
        background: white;
        padding: 40px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .card h2 {
        margin-bottom: 25px;
        color: #0f4c75;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 14px;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: #3282b8;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #0f4c75;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
      }

      button:hover {
        background: #1b6ca8;
      }

      .footer {
        margin-top: 15px;
        font-size: 14px;
      }

      .footer a {
        color: #0f4c75;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h2>Login</h2>
        <form id="loginForm" action="/login" method="POST">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Email Address"
            required
          />
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
          <button type="submit">Login</button>
        </form>
        <div class="footer">
          Don't have an account? <a href="/register">Register</a>
        </div>
      </div>
    </div>
  </body>
  <script>
    document
      .getElementById("loginForm")
      .addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(this);

        try {
          const response = await fetch("/login", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.status === "success") {
            alert("Login Successful!");

            if (data.role === "admin") {
              window.location.href = "/admin"; // ✅ fixed
            } else {
              window.location.href = "/shipping";
            }
          } else {
            alert(data.message);
          }
        } catch (err) {
          alert("Something went wrong!");
        }
      });
  </script>
</html>
