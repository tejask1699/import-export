{% extends "layout.html" %}

{% block content %}

<h1>📊 Dashboard</h1>

<!-- Stats Cards -->
<div class="cards">
    <div class="card">
        <h3>Total Shipments</h3>
        <p id="total">0</p>
    </div>
    <div class="card">
        <h3>In Transit</h3>
        <p id="inTransit">0</p>
    </div>
    <div class="card">
        <h3>Delivered</h3>
        <p id="delivered">0</p>
    </div>
    <div class="card">
        <h3>Delayed</h3>
        <p id="delayed">0</p>
    </div>
</div>

<!-- Shipment Table -->
<h2>📦 Recent Shipments</h2>

<table id="shipmentTable">
    <thead>
        <tr>
            <th>Tracking</th>
            <th>Route</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<style>
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.card h3 {
    margin: 0;
    color: #0f4c75;
}

.card p {
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
}

/* Table */
table {
    width: 100%;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

tr:hover {
    background: #f1f1f1;
    cursor: pointer;
}

/* Status Colors */
.status {
    padding: 4px 8px;
    border-radius: 5px;
    color: white;
    font-size: 12px;
}

.in-transit { background: #ffc107; color: black; }
.delivered { background: #28a745; }
.pending { background: #6c757d; }
.delayed { background: #dc3545; }

</style>

<script>
async function loadDashboard() {
    try {
        const res = await fetch('/api/shipments');
        const data = await res.json();

        const shipments = data.data;

        // Stats
        document.getElementById('total').innerText = shipments.length;
        document.getElementById('inTransit').innerText =
            shipments.filter(s => s.status === 'in-transit').length;
        document.getElementById('delivered').innerText =
            shipments.filter(s => s.status === 'delivered').length;
        document.getElementById('delayed').innerText =
            shipments.filter(s => s.status === 'delayed').length;

        // Table
        const tbody = document.querySelector('#shipmentTable tbody');

        tbody.innerHTML = shipments.map(s => `
            <tr onclick="goTrack('${s.tracking_number}')">
                <td>${s.tracking_number}</td>
                <td>${s.origin} → ${s.destination}</td>
                <td>
                    <span class="status ${s.status}">
                        ${s.status}
                    </span>
                </td>
            </tr>
        `).join('');

    } catch (err) {
        console.error("Dashboard load failed", err);
    }
}

// Redirect to tracking
function goTrack(trackingNumber) {
    window.location.href = `/tracking?tracking=${trackingNumber}`;
}

// Init
document.addEventListener('DOMContentLoaded', loadDashboard);
</script>

{% endblock %}
