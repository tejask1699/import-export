{% extends "layout.html" %}
{% block content %}

<h2 style="margin-bottom:20px;">📊 Dashboard</h2>

<!-- SEARCH -->
<div class="card" style="margin-bottom:20px;">
  <input
    type="text"
    id="searchInput"
    placeholder="Search tracking / city..."
    style="width:300px;"
  />
</div>

<!-- STATS -->
<div style="
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-bottom:20px;
">

  <div class="card">
    <h4>Total</h4>
    <p id="total">0</p>
  </div>

  <div class="card">
    <h4>In Transit</h4>
    <p id="inTransit">0</p>
  </div>

  <div class="card">
    <h4>Delivered</h4>
    <p id="delivered">0</p>
  </div>

  <div class="card">
    <h4>Delayed</h4>
    <p id="delayed">0</p>
  </div>

</div>

<!-- TABLE -->
<div class="card">
  <h3 style="margin-bottom:10px;">📦 Shipments</h3>

  <table id="shipmentTable">
    <thead>
      <tr>
        <th>Tracking</th>
        <th>Route</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- PAGINATION -->
  <div id="pagination" style="margin-top:15px;"></div>
</div>

<style>
input {
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

/* STATUS */
.status {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.in-transit { background:#fff3cd; color:#856404; }
.delivered { background:#d4edda; color:#155724; }
.pending { background:#94a3b8; color:white; }
.delayed { background:#f8d7da; color:#721c24; }

/* PAGINATION */
#pagination button {
  margin: 5px;
  padding: 6px 12px;
  border: none;
  background: #e2e8f0;
  border-radius: 6px;
  cursor: pointer;
}

#pagination button.active {
  background: var(--secondary);
  color: white;
}
</style>

<script>
let currentPage = 1;
let currentSearch = "";

async function loadDashboard(page = 1, search = "") {
  try {
    const res = await fetch(
      `/api/user-reports?page=${page}&limit=5&search=${search}`
    );
    const data = await res.json();

    const shipments = data.data;

    // STATS
    if (data.stats) {
      total.innerText = data.stats.total;
      inTransit.innerText = data.stats.in_transit;
      delivered.innerText = data.stats.delivered;
      delayed.innerText = data.stats.delayed;
    }

    // TABLE
    const tbody = document.querySelector("#shipmentTable tbody");

    if (!shipments.length) {
      tbody.innerHTML = `<tr><td colspan="3">No shipments found</td></tr>`;
    } else {
      tbody.innerHTML = shipments.map(s => `
        <tr onclick="goTrack('${s.tracking_number}')">
          <td>${s.tracking_number}</td>
          <td>${s.origin} → ${s.destination}</td>
          <td><span class="status ${s.status}">${s.status}</span></td>
        </tr>
      `).join("");
    }

    renderPagination(data.pagination);

  } catch (err) {
    console.error("Dashboard load failed", err);
  }
}

function renderPagination(p) {
  const container = document.getElementById("pagination");

  container.innerHTML = Array.from({length:p.pages}, (_,i)=>`
    <button class="${i+1===p.page?'active':''}" onclick="changePage(${i+1})">
      ${i+1}
    </button>
  `).join("");
}

function changePage(p){
  currentPage = p;
  loadDashboard(p, currentSearch);
}

// SEARCH
document.getElementById("searchInput")
.addEventListener("input", e=>{
  currentSearch = e.target.value;
  loadDashboard(1, currentSearch);
});

// NAV
function goTrack(id){
  window.location.href = `/tracking?tracking=${id}`;
}

// INIT
document.addEventListener("DOMContentLoaded", ()=>{
  loadDashboard();
});
</script>

{% endblock %}
