{% extends "layout.html" %}

{% block content %}

<h1>📊 My Shipment Reports</h1>

<!-- Stats -->
<div class="cards">
    <div class="card">
        <h3>Total</h3>
        <p id="total">0</p>
    </div>
    <div class="card">
        <h3>In Transit</h3>
        <p id="inTransit">0</p>
    </div>
    <div class="card">
        <h3>Delivered</h3>
        <p id="delivered">0</p>
    </div>
    <div class="card">
        <h3>Delayed</h3>
        <p id="delayed">0</p>
    </div>
</div>

<!-- Filter -->
<select id="filter" onchange="filterTable()">
    <option value="">All</option>
    <option value="in-transit">In Transit</option>
    <option value="delivered">Delivered</option>
    <option value="delayed">Delayed</option>
</select>

<!-- Table -->
<table id="reportTable">
    <thead>
        <tr>
            <th>Tracking</th>
            <th>Route</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

{% block styles %}
<style>
    body {
        background: #f5f7fb;
    }

    /* Header */
    h1 {
        margin-bottom: 20px;
        color: #0f4c75;
    }

    /* Cards */
    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        margin-bottom: 25px;
    }

    .card {
        background: linear-gradient(135deg, #ffffff, #f1f6fb);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card h3 {
        margin: 0;
        font-size: 14px;
        color: #666;
    }

    .card p {
        font-size: 26px;
        font-weight: bold;
        margin-top: 10px;
        color: #0f4c75;
    }

    /* Filter */
    #filter {
        padding: 10px 15px 15px 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        font-size: 14px;
        cursor: pointer;
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    thead {
        background: #0f4c75;
        color: white;
    }

    th {
        text-align: left;
        padding: 12px;
        font-size: 14px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
    }

    tr:hover {
        background: #f1f6fb;
        cursor: pointer;
    }

    /* Status badges */
    .status {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
    }

    .in-transit {
        background: #fff3cd;
        color: #856404;
    }

    .delivered {
        background: #d4edda;
        color: #155724;
    }

    .delayed {
        background: #f8d7da;
        color: #721c24;
    }

    /* Empty state */
    td[colspan="4"] {
        text-align: center;
        padding: 20px;
        color: #777;
    }
</style>
{% endblock %}

<script>
    let allShipments = [];

    async function loadReports() {
        const res = await fetch('/api/user-reports');
        const data = await res.json();

        if (!data.success) return;

        allShipments = data.data;

        document.getElementById('total').innerText = data.stats.total;
        document.getElementById('inTransit').innerText = data.stats.in_transit;
        document.getElementById('delivered').innerText = data.stats.delivered;
        document.getElementById('delayed').innerText = data.stats.delayed;

        renderTable(allShipments);
    }

    function renderTable(shipments) {
        const tbody = document.querySelector('#reportTable tbody');

        if (!shipments.length) {
            tbody.innerHTML = `<tr><td colspan="4">No shipments found</td></tr>`;
            return;
        }

        tbody.innerHTML = shipments.map(s => `
        <tr onclick="goTrack('${s.tracking_number}')">
            <td>${s.tracking_number}</td>
            <td>${s.origin} → ${s.destination}</td>
            <td><span class="status ${s.status}">${s.status}</span></td>
            <td>${s.created_at ? new Date(s.created_at).toLocaleString() : '-'}</td>
        </tr>
    `).join('');
    }

    function filterTable() {
        const value = document.getElementById('filter').value;

        if (!value) {
            renderTable(allShipments);
        } else {
            renderTable(allShipments.filter(s => s.status === value));
        }
    }

    function goTrack(id) {
        window.location.href = `/tracking?tracking=${id}`;
    }

    document.addEventListener('DOMContentLoaded', loadReports);
</script>

{% endblock %}
